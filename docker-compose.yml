version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - weather-net

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASS}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_secure_password}
    volumes:
      - ./setup_db.sql:/docker-entrypoint-initdb.d/setup_db.sql
      - weather-db-data:/var/lib/mysql
    networks:
      - weather-net

networks:
  weather-net:
    driver: bridge

volumes:
  weather-db-data:
